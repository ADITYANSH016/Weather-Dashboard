<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Weather Dashboard</div>
    <button id="logoutBtn" class="button-secondary">Log Out</button>
  </header>

  <main class="container dashboard-grid">
    <section class="card forecast-card">
      <h2>Current Weather</h2>
      <div id="weatherSummary">Select a city to view weather details.</div>
    </section>

    <section class="card city-card">
      <h2>Choose a City</h2>
      <div class="city-grid">
        <button class="city-button" data-city="New York">New York</button>
        <button class="city-button" data-city="London">London</button>
        <button class="city-button" data-city="Tokyo">Tokyo</button>
        <button class="city-button" data-city="Sydney">Sydney</button>
      </div>
    </section>
  </main>

  <script>
    document.getElementById('logoutBtn').addEventListener('click', function() {
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
