<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <h1>🌤️ Weather Dashboard</h1>

        <form id="loginForm">

            <input
                type="text"
                id="username"
                placeholder="Username"
                required>

            <input
                type="password"
                id="password"
                placeholder="Password"
                required>

            <button type="submit">
                Login
            </button>

            <div class="demo-login">
                <h3>🔑 Demo Login</h3>
                <p><strong>Username:</strong> admin</p>
                <p><strong>Password:</strong> 1234</p>
                <small>Use these credentials to access the dashboard.</small>
            </div>

            <p id="error"></p>

        </form>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
