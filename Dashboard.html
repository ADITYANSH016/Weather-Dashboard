<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app" class="dashboard-shell">
      <section class="card hero-card">
        <div class="hero-copy">
          <p class="eyebrow">Live weather</p>
          <h1 id="greeting">Hello, friend</h1>
          <p class="subtitle">Search a city to see the current conditions and a 3-day outlook.</p>
        </div>

        <form id="weatherForm" class="search-form">
          <input id="cityInput" name="city" type="text" placeholder="Enter a city" required />
          <button type="submit">Search</button>
        </form>
      </section>

      <section id="weatherContent" class="weather-content">
        <div class="card current-card">
          <p class="status-label">Current weather</p>
          <div id="currentWeather" class="current-weather">Enter a city to get started.</div>
        </div>

        <div class="card forecast-card">
          <p class="status-label">3-day forecast</p>
          <div id="forecastList" class="forecast-list"></div>
        </div>
      </section>

      <p id="errorMessage" class="message" aria-live="polite"></p>
    </main>

    <script type="module" src="scripts/dashboard.js"></script>
  </body>
</html>
